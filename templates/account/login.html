{% load socialaccount %}

<h2>Login</h2>

<form method="post" action="{% url 'account_login' %}">
    {% csrf_token %}
    {% if form %}
        {{ form }}
    {% else %}
        <p>Form not loaded</p>
    {% endif %}
    <button type="submit">Login</button>
</form>

<br><br>

<a href="{% provider_login_url 'google' %}">
    <button type="button">Login with Google</button>
</a>
