<h1>My Profile</h1>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <img
        src="{{ user.profile.image.url }}"
        width="150"
    >

    <br><br>

    <input
        type="text"
        name="username"
        value="{{ user.username }}"
    >

    <br><br>

    <input
        type="file"
        name="image"
    >

    <br><br>

    <button>
        Save Changes
    </button>

</form>
