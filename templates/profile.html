<h1>My Profile</h1>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    {% load static %}

{% if profile.image %}
    <img
        src="{{ profile.image.url }}"
        width="150"
    >
{% else %}
    <img
        src="{% static 'img/default-user.png' %}"
        width="150"
    >
{% endif %}

    <br><br>

    <input
        type="text"
        name="username"
        value="{{ user.username }}"
    >

    <br><br>

    <input
        type="file"
        name="image"
    >

    <br><br>

    <button>
        Save Changes
    </button>

</form>
